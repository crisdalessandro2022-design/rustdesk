name: Build DYA Remote Windows Client

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.22.3"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  VERSION: "1.4.6"

jobs:
  # ── PASO 1: genera el bridge en Linux (rápido) ──────────────────────────────
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake curl gcc git g++ \
            libclang-dev libgtk-3-dev llvm-dev \
            nasm ninja-build pkg-config wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bridge-ubuntu

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install flutter rust bridge deps
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen \
            --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} \
            --features "uuid" --locked
          pushd flutter
          flutter pub get
          popd

      - name: Run flutter rust bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          echo "=== Bridge generado OK ==="
          ls -la flutter/lib/generated_bridge.dart

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h

  # ── PASO 2: build Windows ────────────────────────────────────────────────────
  build-for-windows:
    needs: generate-bridge
    runs-on: windows-2022
    steps:
      - name: Export cache env vars
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Verify bridge files
        shell: bash
        run: |
          echo "=== Verificando bridge ==="
          ls -la flutter/lib/generated_bridge.dart || echo "ERROR: no encontrado"

      - name: Inject DYA server config
        shell: bash
        run: |
          SERVER="${{ secrets.RENDEZVOUS_SERVER }}"
          echo "Inyectando servidor: $SERVER"
          grep -rl "rs-ny.rustdesk.com" --include="*.rs" . 2>/dev/null | while IFS= read -r f; do
            sed -i "s|rs-ny.rustdesk.com|$SERVER|g" "$f"
            echo "Parcheado rs: $f"
          done || true
          grep -rl "rs-ny.rustdesk.com" --include="*.dart" flutter/lib 2>/dev/null | while IFS= read -r f; do
            sed -i "s|rs-ny.rustdesk.com|$SERVER|g" "$f"
            echo "Parcheado dart: $f"
          done || true
          echo "Inyeccion completada"

      - name: Patch DYA Remote branding
        shell: bash
        run: |
          # App name in Rust (hbb_common submodule gets checked out, patch after)
          find . -path "*/hbb_common/src/config.rs" | while IFS= read -r f; do
            sed -i 's|RwLock::new("RustDesk".to_owned())|RwLock::new("DYA Remote".to_owned())|g' "$f"
            echo "Patched hbb_common: $f"
          done || true

          # Windows Flutter runner - app name and description
          sed -i 's|L"RustDesk"|L"DYA Remote"|g' flutter/windows/runner/main.cpp || true
          sed -i 's|"RustDesk Remote Desktop"|"DYA Remote"|g' flutter/windows/runner/Runner.rc || true
          sed -i 's|VALUE "ProductName", "RustDesk"|VALUE "ProductName", "DYA Remote"|g' flutter/windows/runner/Runner.rc || true
          sed -i 's|VALUE "FileDescription", "RustDesk Remote Desktop"|VALUE "FileDescription", "DYA Remote"|g' flutter/windows/runner/Runner.rc || true

          # MSI localization strings
          sed -i 's|Value="RustDesk"|Value="DYA Remote"|g' res/msi/Package/Language/Package.en-us.wxl || true
          sed -i 's|RustDesk - Main programs installations|DYA Remote - Main programs installations|g' res/msi/Package/Language/Package.en-us.wxl || true
          sed -i 's|Removes RustDesk or parts of it|Removes DYA Remote or parts of it|g' res/msi/Package/Language/Package.en-us.wxl || true
          sed -i 's|Start RustDesk|Start DYA Remote|g' res/msi/Package/Language/Package.en-us.wxl || true

          # is_rustdesk check in common.rs
          sed -i 's|.eq("RustDesk")|.eq("DYA Remote")|g' src/common.rs || true

          echo "Branding patch completado"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r f; do
              echo "$f:"; cat "$f"
            done
            exit 1
          fi

      - name: Build rustdesk (flutter windows)
        run: |
          python3 .\build.py --portable --flutter --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

      - name: Download usbmmidd driver
        shell: bash
        run: |
          curl -L -o usbmmidd_v2.zip \
            https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip
          unzip usbmmidd_v2.zip
          rm -rf usbmmidd_v2/Win32
          rm -f usbmmidd_v2/deviceinstaller64.exe \
                usbmmidd_v2/deviceinstaller.exe \
                usbmmidd_v2/usbmmidd.bat
          mv usbmmidd_v2 ./rustdesk/

      - name: Build self-extracted exe
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py \
            -f ../../rustdesk/ \
            -o . \
            -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./DYARemote
          mv ./target/release/rustdesk-portable-packer.exe \
             ./DYARemote/DYA-Remote-${{ env.VERSION }}-x64.exe

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build MSI installer
        run: |
          pushd ./res/msi
          python preprocess.py --arp --app-name "DYA Remote" -d ../../rustdesk
          nuget restore msi.sln
          msbuild msi.sln `
            -p:Configuration=Release `
            -p:Platform=x64 `
            /p:TargetVersion=Windows10
          mv ./Package/bin/x64/Release/en-us/Package.msi `
             ../../DYARemote/DYA-Remote-${{ env.VERSION }}-x64.msi
          popd

      - name: Upload DYA Remote installers
        uses: actions/upload-artifact@v4
        with:
          name: DYA-Remote-Windows
          path: DYARemote/
          retention-days: 30
