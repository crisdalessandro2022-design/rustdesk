name: Build DYA Remote Windows Client

on:
  workflow_dispatch:

env:
  SCITER_RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"

jobs:
  build-for-windows:
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Inject DYA Remote server configuration
        shell: bash
        run: |
          # Inject server and key into source
          sed -i "s|https://rs-ny.rustdesk.com|${{ secrets.RENDEZVOUS_SERVER }}|g" src/common.rs || true
          sed -i "s|rs-ny.rustdesk.com|${{ secrets.RENDEZVOUS_SERVER }}|g" src/common.rs || true
          # Set public key
          grep -r "rs2025" src/ || true
          find . -name "*.rs" | xargs grep -l "rendezvous_server\|RS_PUB_KEY" 2>/dev/null | head -5

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; cat "$_1"
            done
            exit 1
          fi
        shell: bash

      - name: Generate bridge
        run: |
          pip3 install toml
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
        continue-on-error: true

      - name: Build flutter windows
        shell: bash
        run: |
          # Patch server config in flutter
          grep -r "rs-ny.rustdesk.com\|rendezvous" flutter/lib/ 2>/dev/null | head -10 || true
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Build portable exe
        shell: bash
        run: |
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk
          # Download required drivers
          curl -L -o usbmmidd_v2.zip https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath . 2>/dev/null || unzip usbmmidd_v2.zip || true
          mv ./usbmmidd_v2 ./rustdesk || true
        continue-on-error: true

      - name: Build self-extracted exe
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./DYARemote
          mv ./target/release/rustdesk-portable-packer.exe ./DYARemote/DYA-Remote-${{ env.VERSION }}-x64.exe
        continue-on-error: true

      - name: Upload DYA Remote executable
        uses: actions/upload-artifact@v4
        with:
          name: DYA-Remote-Windows-x64
          path: |
            DYARemote/DYA-Remote-${{ env.VERSION }}-x64.exe
            rustdesk/rustdesk.exe
          retention-days: 30
